<span class="field-val" id="v-ic-std">0.25%</span>
            </div>
            <input type="range" min="0.05" max="0.50" step="0.01" value="0.25" id="roi-ic" oninput="calcROI()"/>

      </div>
    </div>
  </div>

  <div class="results-sidebar">
    <div class="result-hero">
      <div class="result-hero-label">Estimated Annual Savings</div>

<script>
// PDF GENERATION FUNCTION
function generatePDF() {
  const element = document.querySelector('.shell');
  document.body.classList.add('is-printing');

  const opt = {
    margin: [10, 5, 10, 5],
    filename: 'Outseer_3DS_ROI_Report.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    document.body.classList.remove('is-printing');
  });
}

// TOGGLE ACCORDION
function toggleStep(stepNum) {
  const card = document.getElementById('step-' + stepNum);
  card.classList.toggle('active');
}

// ROI CALCULATOR LOGIC
function calcROI() {
  // 1. Get Inputs
  const vol = parseFloat(document.getElementById('roi-vol').value);
  const curFR = parseFloat(document.getElementById('roi-current-fr').value) / 100;
  const tgtFR = parseFloat(document.getElementById('roi-target-fr').value) / 100;
  const aov = parseFloat(document.getElementById('roi-aov').value);
  const smsCost = parseFloat(document.getElementById('roi-sms').value);
  const otpSplit = parseFloat(document.getElementById('roi-otp-split').value) / 100;
  const abandon = parseFloat(document.getElementById('roi-abandon').value) / 100;
  const icRate = parseFloat(document.getElementById('roi-ic').value) / 100;
  
  const missedBefore = parseFloat(document.getElementById('roi-missed-before').value);
  const missedAfter = parseFloat(document.getElementById('roi-missed-after').value);
  const fraudLoss = parseFloat(document.getElementById('roi-fraud-loss').value);

  // 2. Update Labels
  document.getElementById('v-vol').innerText = vol.toLocaleString();
  document.getElementById('v-cur').innerText = (curFR * 100).toFixed(0) + '%';
  document.getElementById('v-tgt').innerText = (tgtFR * 100).toFixed(0) + '%';
  document.getElementById('v-aov').innerText = '£' + aov;

  // 3. Simple Math Example (Expand this to match your specific business logic)
  const monthlyVolumeShift = vol * (tgtFR - curFR);
  const annualSmsSavings = (monthlyVolumeShift * otpSplit * smsCost) * 12;
  const annualFraudSavings = (missedBefore - missedAfter) * fraudLoss;
  const annualIcRecovery = (monthlyVolumeShift * abandon * aov * icRate) * 12;

  const totalSavings = annualSmsSavings + annualFraudSavings + annualIcRecovery;

  // 4. Display Results
  document.getElementById('res-total').innerText = '£' + Math.round(totalSavings).toLocaleString();
  document.getElementById('res-ops').innerText = '£' + Math.round(annualSmsSavings).toLocaleString();
  document.getElementById('res-fraud').innerText = '£' + Math.round(annualFraudSavings).toLocaleString();
  document.getElementById('res-ic').innerText = '£' + Math.round(annualIcRecovery).toLocaleString();
}

// Run once on load
calcROI();
</script>
